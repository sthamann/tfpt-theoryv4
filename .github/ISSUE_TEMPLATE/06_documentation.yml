name: "📝 Documentation issue"
description: Something in the README, the docs/ guides, the papers, or the website is unclear, wrong, or broken.
title: "[docs] "
labels: ["docs"]
body:
  - type: input
    id: where
    attributes:
      label: Where?
      placeholder: "e.g. README.md, docs/FOR_PHYSICISTS.md, https://www.fixpoint-theory.com/…"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or wrong?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix (optional)
