name: Sync tfpt5-shadow mirror

on:
  push:
    branches: [main]
  schedule:
    # Re-assert the mirror periodically. Overleaf is wired bidirectionally to
    # tfpt5-shadow and its push-back DELETES every repo file it does not track
    # (the v235-v298 suite block, video/, ...). A scheduled re-sync self-heals
    # the mirror even when there is no new push to the source repo.
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: shadow-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4

      - name: Validate shadow token
        env:
          SHADOW_TOKEN: ${{ secrets.SHADOW_REPO_TOKEN }}
        run: |
          if [ -z "${SHADOW_TOKEN}" ]; then
            echo "::error::Secret SHADOW_REPO_TOKEN is missing."
            echo "Add a PAT with Contents: Read and write on sthamann/tfpt5-shadow"
            echo "to the main repo secrets (Settings → Secrets → Actions)."
            exit 1
          fi

      - name: Prepare shadow repository checkout
        env:
          SHADOW_TOKEN: ${{ secrets.SHADOW_REPO_TOKEN }}
        run: |
          set -euo pipefail
          remote="https://x-access-token:${SHADOW_TOKEN}@github.com/sthamann/tfpt5-shadow.git"

          if git ls-remote --heads "$remote" main | grep -q .; then
            git clone --depth 1 --branch main "$remote" shadow
          else
            mkdir shadow
            git -C shadow init -b main
            git -C shadow remote add origin "$remote"
          fi

      - name: Export filtered tree
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash scripts/export-shadow.sh shadow

      - name: Commit and push mirror
        working-directory: shadow
        env:
          SHADOW_TOKEN: ${{ secrets.SHADOW_REPO_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          remote="https://x-access-token:${SHADOW_TOKEN}@github.com/sthamann/tfpt5-shadow.git"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --staged --quiet; then
            echo "Shadow mirror already up to date."
            exit 0
          fi

          short_sha="${SOURCE_SHA:0:7}"
          git commit -m "Sync from ${SOURCE_REPO}@${short_sha}

          One-way mirror for Overleaf GitHub sync (no _archive, website, or PDFs)."

          # Force-push so the mirror is ALWAYS exactly the export from main. The
          # shadow is one-way by design (main -> mirror -> Overleaf pull); an
          # Overleaf push-back only ever deletes repo files it does not track, so
          # overwriting it is correct and lets the mirror self-heal.
          if ! git push --force "$remote" HEAD:main; then
            echo "::error::Force-push to sthamann/tfpt5-shadow failed (HTTP 403 = token lacks write access)."
            echo "Fine-grained PAT: grant this token Contents Read+Write on tfpt5-shadow only."
            echo "Classic PAT: needs the 'repo' scope."
            exit 1
          fi
