# Preregistered detector criteria for the E8 mass-ladder blind-recovery bed.
# Frozen BEFORE the blind detector is run on the real peak lists. Note on timing:
# the underlying spectra were published in 2020/2021 and the peak tables were
# extracted (digitized/transcribed) before this file was written -- this is a
# DETECTOR-VALIDATION bed on known-answer data, not a discovery search. What is
# preregistered here is the detector, its gates, the null model, the control
# battery, and the verdict criteria, so that none of them is tuned post hoc to
# the outcome of the blind runs.

experiment: e8-ladder-bed
domain: condensed matter (1D Ising-chain quantum criticality, Zamolodchikov E8 spectrum)
role: >
  Detector validation of the TFPT Cartan-PF ladder pipeline on published real data.
  A successful recovery confirms Zamolodchikov E8 physics in the materials, NOT the
  TFPT axioms (scorecard row is typed parked_analog / "analog only").
version: v1

firewall: >
  The E8 spectrum at the perturbed 1D transverse-field Ising QCP is established
  physics (Zamolodchikov 1989) and its material realizations are published
  (Coldea+ 2010; Amelin+ 2020; Zou+ 2021; Zhang+ 2020). Recovering the ladder
  blindly from the published peak positions validates the LADDER DETECTOR
  (assignment search + scale fit + null calibration), i.e. the analysis pipeline
  TFPT uses elsewhere (e.g. hfqpo-ladder). It does NOT test c3 = 1/(8pi) or
  g_car = 5, and no TFPT number enters the E8 mass ratios. Nothing here is [E];
  nothing gets a \veri{}. Failure kills the detector, not TFPT.

theory_reference:
  ladder: Zamolodchikov E8 one-particle mass ratios, EXACT closed forms
  m_over_m1:
    - 1
    - 2*cos(pi/5)                      # 1.6180339887498948 (golden ratio)
    - 2*cos(pi/30)                     # 1.9890437907365467
    - 4*cos(pi/5)*cos(7*pi/30)         # 2.4048671723720653
    - 4*cos(pi/5)*cos(2*pi/15)         # 2.9562952014676113
    - 4*cos(pi/5)*cos(pi/30)           # 3.2183404585236658
    - 8*cos(pi/5)^2*cos(7*pi/30)       # 3.8911568233268538
    - 8*cos(pi/5)^2*cos(2*pi/15)       # 4.7833861167528131
  pf_selftest: >
    The mass vector is the Perron-Frobenius eigenvector of the E8 Cartan matrix
    (equivalently of the Dynkin adjacency 2I - A); the lowest Cartan eigenvalue is
    2 - 2*cos(pi/30) = 4*sin^2(pi/60). Machine-check both to < 1e-12 relative
    error before any data run (cross-check of experiments/next.txt Hook 3).

data:
  - id: BCVO_INS_4p7T
    role: PRIMARY (all 8 one-particle masses)
    source: >
      Zou, Cui, Wang et al., PRL 127, 077201 (2021); arXiv:2005.13302v3, Fig. 3(a):
      INS at Q=(002), H = 4.7 T || [010] (the NMR-determined 1D QCP, 4.7 +/- 0.3 T),
      T = 0.4 K. Peak positions digitized from the arXiv vector figure (red
      single-particle markers + Gaussian-fit-curve maxima), axis calibrated on the
      figure ticks; calibration validated on panel (b) where the same marker style
      reproduces the analytic positions 1.2*r_i meV to <= 0.8%. Instrument energy
      resolution 0.1 meV (stated in the paper, Fig. 4 caption).
    sigma_policy: >
      sigma = 0.10 meV per single-particle peak (instrument resolution, conservative),
      sigma = 0.12 meV for broader multi-particle/folding peaks (curve maxima).
      Sensitivity variant: sigma = 0.05 meV (reported, not primary).
  - id: CoNb2O6_THz_4p75T
    role: SECONDARY (m1..m6; m7, m8 outside the 0.6 THz low-pass window)
    source: >
      Amelin et al., PRB 102, 104431 (2020); arXiv:2006.12956. Verbatim from the
      text: sharp peaks at 0.16, 0.26, 0.32, 0.40, 0.47, 0.51 THz at B = 4.75 T
      (labelled m1..m6) plus a relatively broad peak at 0.43 THz (asterisk,
      onset of the m1+m2 continuum -- a known contaminant the blind detector may
      NOT be told about). Frequency resolution 6 GHz.
    sigma_policy: sigma = 0.01 THz per peak (resolution 0.006 THz + 0.005 THz rounding).
  - id: Coldea2010
    role: historical anchor only (m2/m1 -> golden ratio near Bc); not a blind input.

detector:
  blindness: >
    Input is the SORTED peak list with sigmas only. No single/multi-particle labels,
    no knowledge of which peak is m1. Every peak is tried as the m1 anchor.
  assignment_search: >
    For each anchor peak j (scale s0 = p_j): monotone injective DP matching of
    peaks to the 8 rungs, per-pair gate |p_i - s*r_k| <= 3*sigma_i, lexicographic
    objective (maximize n_assigned, then minimize chi2); two scale-refinement
    iterations (weighted least squares on matched pairs, then re-match).
  physical_gates:
    - rung r1 (m1) must be assigned (the anchor peak itself)
    - >
      every peak below 2*s - 2*sigma (one-particle region: no continua below the
      2*m1 threshold) must be assigned to a rung; otherwise the assignment
      hypothesis is rejected
    - peaks above 2*s may remain unassigned (multi-particle continua, zone folding)
  score: chi2/dof with dof = n_assigned - 1 (scale is fitted)
  null_model: >
    K = 5000 random 8-rung ladders, r1 = 1, remaining 7 ratios i.i.d. uniform in
    log-space on [1, 4.7834] (same dynamic range as E8), sorted; identical detector,
    identical gates, identical peak list. p = fraction of random ladders with
    (n_assigned >= n_obs) AND (chi2/dof <= chi2dof_obs). Seed 0, fixed.

runs:
  - id: A1_bcvo_full_blind
    desc: >
      PRIMARY. Full 17-peak BCVO list (singles + multi-particle + folding peaks,
      no labels) -> blind recovery + MC p. Tests contamination robustness.
  - id: A2_bcvo_singles_only
    desc: >
      SECONDARY (diagnostic, not fully blind in the peak-selection sense): only
      the paper's eight single-particle marker positions as input -> quantifies
      the detector significance without continuum contamination.
  - id: B_conb2o6_blind
    desc: full 7-peak CoNb2O6 list (m1..m6 + the 0.43 THz continuum-onset peak).
  - id: C_control_battery
    desc: scramble / offset / jitter / wrong-ladder / Airy-bed (below).

controls:  # every class must be REJECTED (no validated-level recovery)
  - id: CTRL.scramble
    desc: log-gap scramble of the real peak list (permute log-spacings, rebuild), 200 seeds
  - id: CTRL.offset
    desc: additive offset +/- {0.3, 0.5} * m1_obs on all peaks (breaks ratios, keeps spacings)
  - id: CTRL.jitter
    desc: multiplicative per-peak jitter 5% and 10% (200 seeds each), detection-rate report
  - id: CTRL.wrong_ladder
    desc: >
      alternative ladders on the REAL data: harmonic 1:2:...:8, A3 Cartan-PF ladder,
      D8 Cartan-PF ladder, Airy/confined-spinon ladder (zero-field physics of the
      same materials, E_i = E0 + lambda*zeta_i with the published BCVO fit scale).
      E8 must strictly beat all of them on (n_assigned, then p / chi2) on real data.
  - id: CTRL.airy_bed
    desc: >
      synthetic Airy-ladder spectrum (confined spinons, the actual zero-field physics
      of these compounds) fed to the E8 detector -- must NOT reach validated level.

amendment_v1_1: >
  TIMING DISCLOSURE: recorded AFTER the first full v1 run (all v1 numbers are
  preserved in results.json and the README). Three v1 control criteria were
  found to be miscalibrated as null classes, independent of the E8 outcome:
  (1) JITTER: the v1 rule "5-10% jitter must be rejected like a scramble" is
  internally inconsistent -- the real BaCo2V2O8 peaks themselves deviate from
  the exact E8 ratios by up to ~4-5% (published, resolution-limited), so any
  detector that rejects 5%-jittered spectra must also reject the real data.
  Jitter is therefore evaluated as a DOSE-RESPONSE scan (5/10/20/30%): the rate
  must decay with the jitter level and reach <= 5% at the destructive level
  (30%, i.e. several times both the measurement sigma and the real data's own
  deviations). v1 rates at all levels remain reported.
  (2) SCRAMBLE near-duplicates: for a short peak list with several near-equal
  log-gaps (CoNb2O6: three gaps of 0.07-0.09), a gap permutation can reproduce
  the original spectrum within 2 sigma on every peak. Such trials reproduce the
  true pattern and are counted separately, and the false-alarm region is
  evaluated "as good or better than the observed recovery" (n >= n_obs), the
  standard p-value convention. Rejection rule: non-near-duplicate rate at
  observed strength <= 5%. Rates at the v1 validation bar remain reported.
  (3) WRONG-LADDER comparator: v1 code compared raw (n, chi2) without applying
  the chi2/dof <= 2 gate that the preregistered detection definition itself
  imposes; a competitor that fails the gate is not a valid recovery. Fixed to
  gate-then-compare (raw values still reported).

verdict_criteria:
  validated: >
    BCVO: n_assigned >= 6 of 8 rungs with chi2/dof <= 2 and MC p < 0.01, AND
    CoNb2O6: all rungs inside the measurement window recovered (>= 5 of the 6
    published) with p < 0.01, AND every control class rejected (scramble/jitter
    detection rate <= 5% at validated criteria, offset and Airy beds rejected,
    E8 wins the wrong-ladder battery on real data).
  partially_validated: >
    recovery succeeds on one material at validated level but the other is
    data_limited/marginal, or a control class is marginal (5-20% leakage).
  failed: >
    pipeline fails to recover the published ladder (n < 6 on BCVO or p >= 0.05)
    or any control class is systematically accepted.
  honesty: >
    missing rungs must be listed per material with the published reason
    (e.g. m7/m8 above the CoNb2O6 low-pass window; BCVO m7 blended with
    multi-particle peaks at the 0.1 meV resolution).

# ---------------------------------------------------------------------------
# AMENDMENT v2 -- 2D coherent spectroscopy (2DCS) extension.
# ---------------------------------------------------------------------------
amendment_v2:
  recorded: 2026-07-21
  status: prepared_awaiting_data
  timing_disclosure: >
    Recorded BEFORE any 2D peak map (theoretical or experimental) is fed to a
    recovery run, and BEFORE the 2D detector code below existed. Trigger:
    arXiv:2512.16829 (Watanabe, Trebst, Hickey, "Two-dimensional coherent
    spectroscopy of CoNb2O6", Dec 2025). Disclosure: that paper was READ to
    design this amendment (peak-family taxonomy, Lehmann pathway structure of
    chi^(3;2)_yyyy, localized-limit closed forms used for the negative
    control). It is a THEORY paper: four-kink/ED model spectra at B_y = 0-3 T
    (localized-limit regime, NOT the 1D E8 quantum critical point at
    B_c ~ 5.3 T || b), with no E8 assignments and no experimental data. As of
    2026-07-21 NO experimental 2DCS measurement on CoNb2O6 is published
    (web-checked). Therefore no blind E8-target data exists yet; everything
    below is frozen now so that, when experimental 2DCS peak tables at/near
    the E8 field appear, none of the criteria can be tuned post hoc. No
    recovery run of any kind preceded this freeze.
  data_situation: >
    (i) arXiv:2512.16829 predicts, for CoNb2O6 in the LOW-field localized
    regime (B_y ~ 2-3 T), a discrete 2DCS peak set built from the two-kink
    bound states eps_pm = J +/- sqrt(2)*h_plus and four-kink ("tetraquark")
    states 2J +/- sqrt(3)*h_plus, 2J +/- h_plus, 2J, with J = 2.48 meV,
    alpha_yz = 0.226, localized limit h_y = J*alpha_yz (h_plus = J*alpha_yz =
    0.5605 meV). These closed forms give an ANALYTIC non-E8 2D peak map --
    preregistered here as a material-specific NEGATIVE control (expectation:
    the E8 2D detector must REJECT it). Numerical model maps: Zenodo
    10.5281/zenodo.17879513 (data.zip, model output, not measurements).
    (ii) The E8-target observable (future experiment): 2DCS map
    Im[chi^(3;2)_yyyy(omega_t, omega_tau)] of CoNb2O6 at/near the 1D QCP,
    B ~ 4.7-5.5 T || b, sub-Kelvin (the 1D E8 window; cf. Amelin+ at 0.25 K);
    extractable peak coordinates with per-number provenance (text/table
    preferred; figure digitization with documented read-off sigma as
    fallback, conservative).
  observable_v2: >
    Input = list of N 2D peak coordinates (omega_tau, omega_t) with one
    isotropic 1-sigma uncertainty per peak, folded to the positive quadrant
    (|omega_tau|, |omega_t|); no pathway labels, no single/multi-particle
    labels, no knowledge of which frequency is m1. Axis convention:
    omega_tau = pump/coherence axis, omega_t = detection axis (paper figures
    quote (omega_t, omega_tau); fold makes the detector symmetric to that
    choice within families F1/F2; F3 differences live on the detection axis).
  catalog_families:   # predicted 2D positions for scale s (= m1_hat), rungs r_a
    F1_diagonal: "(s*r_a, s*r_a), a = 1..8 -- NR/R echo family (folded)"
    F2_cross: "(s*r_a, s*r_b), a != b -- third-term cross peaks (omega_P, omega_R)"
    F3_difference: >
      (s*r_a, s*|r_a - r_b|), a != b -- Q-coherence pathways sin(omega_P*tau +
      (omega_P - omega_Q)*t); THE channel by which rungs above a low-pass
      window (m7, m8 in a 0.6 THz window at m1 = 0.16 THz) can appear inside
      the window via difference frequencies.
    F4_two_particle_sums: >
      NOT scored in v2 (combinatorial explosion would inflate chance matches);
      matched peaks are never assigned to F4; reported qualitatively only.
  detector_v2:
    scale_hypotheses: >
      every folded axis value of every peak, tried as s*r_k for every rung k
      (<= 16*N hypotheses, deduplicated at 1e-9 relative) -- blind analog of
      the v1 anchor scan; no preferred rung.
    matching: >
      injective assignment peaks -> catalog entries (F1 u F2 u F3, 120
      entries), per-peak two-axis gate |pull_axis| <= 3 on BOTH axes,
      chi2_peak = pull_tau^2 + pull_t^2; objective lexicographic
      (max n_matched, then min chi2) via a padded linear-sum assignment
      (deterministic); two scale-refinement iterations (weighted LS over both
      axes of matched pairs, re-match), as in v1.
    physical_gates:
      - rung 1 must be covered by at least one matched peak (v1 anchor gate)
      - >
        every peak with BOTH folded coordinates below 2*s - 2*sigma (pure
        one-particle square: no continua below the two-particle threshold on
        either axis) must be matched, else the scale hypothesis is rejected;
        peaks with any coordinate >= 2*s may stay unmatched (multi-particle,
        higher-order pathways).
    coverage: >
      n_rungs = |union of rungs referenced by matched entries| (F1 (a,a) -> {a};
      F2 (a,b) -> {a,b}; F3 (a,|a-b|) -> {a,b}); PRIMARY score. Secondary:
      n_matched peaks; chi2/dof with dof = 2*n_matched - 1 (scale fitted).
      Selection over scale hypotheses: lexicographic (n_rungs, n_matched,
      -chi2).
    null_model: >
      K = 5000 random 8-rung ladders (identical generator to v1: r1 = 1,
      7 i.i.d. uniform-log ratios on [1, 4.7834], sorted, seed 0), identical
      catalog construction, gates and scoring;
      p = P[(n_rungs >= n_obs) AND (chi2/dof <= chi2dof_obs)], add-one
      estimator. Control-battery rate scans use 500 null ladders
      (documented, conservative direction; same convention as v1).
  runs_v2:
    - id: KA2D_synthetic_e8
      desc: >
        known-answer synthetic E8 2D map, m1 = 0.16 THz (CoNb2O6 scale), all
        coordinates inside the 0.6 THz instrument window on BOTH axes, with
        rungs 7/8 present ONLY via F3 difference coordinates, plus 2
        off-ladder contaminant peaks. Must recover 8/8 rung coverage with
        chi2/dof <= 2 and MC p < 0.01. This is the machine test of the claim
        that 2DCS can unlock m7/m8 inside the 1D-inaccessible window.
    - id: NEG2D_localized_limit
      desc: >
        analytic TFIM+YZ localized-limit 2DCS peak map (closed forms above,
        J = 2.48 meV, alpha_yz = 0.226; the actual published prediction for
        CoNb2O6 at B_y ~ 2-3 T from arXiv:2512.16829) -> E8 2D detector.
        Preregistered expectation: REJECTED (no validated-level recovery).
    - id: REAL2D_conb2o6_e8point
      desc: >
        BLOCKED until experimental 2DCS peak tables at/near B_c exist. Blind
        discipline: if the future paper prints E8 assignments, our recovery
        runs FIRST on the unlabeled coordinate list, comparison after.
    - id: C2D_control_battery
      desc: scramble2d / offset2d / jitter2d / wrong-ladder2d (below).
  controls_v2:   # every class must be REJECTED
    - id: CTRL2D.scramble
      desc: >
        permute the detection-axis values among peaks (keeps both marginal
        frequency distributions, destroys the 2D pairing structure), 200
        seeds; v1.1 near-duplicate convention carries over (trials landing
        within 2 sigma of the original map on every coordinate are counted
        separately); rejection: non-near-duplicate rate at observed strength
        <= 5%.
    - id: CTRL2D.offset
      desc: additive shift +/- {0.3, 0.5} * m1_hat on both axes; must fail.
    - id: CTRL2D.jitter
      desc: >
        multiplicative per-coordinate jitter, dose-response 5/10/20/30%
        (100 trials per level; binomial resolution documented), monotone decay
        required, rate <= 5% at the destructive 30% level (v1.1 convention).
    - id: CTRL2D.wrong_ladder
      desc: >
        harmonic 1..8, D8 Cartan-PF and Airy/confined-spinon ladders run
        through the identical 2D catalog machinery on the same peak list;
        gate-then-compare as in v1.1 (competitor must pass chi2/dof <= 2);
        E8 must strictly win on (n_rungs, n_matched, then chi2).
  verdict_criteria_v2:
    validated_2d: >
      real E8-point data only: n_rungs >= 6 with chi2/dof <= 2 and MC
      p < 0.01, AND every control class rejected on the same map.
    m7_m8_upgrade_rule: >
      the CoNb2O6 leg moves from 6/8 to n/8 (n in {7,8}) ONLY if rung 7
      and/or rung 8 is covered by >= 1 matched peak with both-axis pulls
      <= 3 sigma AND the combined recovery has MC p < 0.01. Until real 2DCS
      data exists the leg stays 6/8.
    prepared_awaiting_data: >
      the state after this amendment if KA2D passes, NEG2D and all synthetic
      control classes are rejected, and no real data exists: the 2D detector
      is validated and frozen, the CoNb2O6 verdict is UNCHANGED (6/8,
      p = 0.0038).
    kill_2d: >
      detector fails KA2D (n_rungs < 8 or p >= 0.01), OR fires at validated
      level on NEG2D_localized_limit, OR scramble2d/jitter2d leak > 5% at the
      preregistered levels -> the 2D extension is killed (v1 1D results
      untouched); failure kills the detector, not TFPT.
  no_retroactive_changes: >
    v1/v1.1 criteria, runs and numbers are untouched by this amendment. The
    v2 detector is additive; it shares only ladder.py (frozen by tests) and
    the null-ladder generator with v1.

amendment_v2_1: >
  TIMING DISCLOSURE: recorded AFTER the first KA2D synthetic diagnostic runs
  (2026-07-21; 200-null scan p = 0.0149, 500-null scan p = 0.0200) and BEFORE
  the headline 5000-null run and the control battery. No real data is
  involved anywhere (KA2D is the preregistered synthetic known-answer map).
  Issue found, independent of any target outcome: the v2 null-model region
  "p = P[(n_rungs >= n_obs) AND (chi2/dof <= obs)]" omits n_matched, the
  second component of the detector's own preregistered lexicographic
  objective (n_rungs, n_matched, -chi2). Null recoveries that leave 3 of the
  11 peaks unmatched (n_matched = 8 vs observed 11) were counted as "as good
  as" the observed recovery. This is the same miscalibration class as
  amendment v1.1 item (2): the false-alarm region must be "as good or better
  than the observed recovery" in EVERY score component the detector
  maximizes (the v1 1D detector needed only (n, chi2) because peak count and
  rung coverage coincide in 1D; in 2D they split into n_matched and
  n_rungs). CORRECTED REGION (v2.1, used for all headline numbers and the
  control battery): p = P[(n_rungs >= n_obs) AND (n_matched >= n_matched_obs)
  AND (chi2/dof <= obs)]. Both counts are reported side by side in
  results2d.json (n_as_good_coverage_only preserves the v2 region). The
  detector, gates, catalog, KA/NEG maps and all other criteria are untouched.
  Efficiency notes (no criteria change): (i) null-ladder scans prune scale
  hypotheses whose 2x-loose-gate rung-coverage upper bound is below the
  observed n_rungs (exact for the p-value: such hypotheses can never enter
  the success region; machine-checked pruned-vs-unpruned on 60 null ladders
  in tests/test_recover2d.py); (ii) control-battery detection decisions stop
  a null scan early once the p < 0.01 threshold can no longer be reached
  (n_good >= 5 of 500 or >= 10 of 1000) -- binary-decision equivalent to the
  full scan.
