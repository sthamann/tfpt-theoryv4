      q_Bek < 1 -> the state is described by the geometry channel (ordinary spacetime);
      q_Bek = 1 -> the SAME state saturates the holographic bound and is described as a
      black hole. The horizon is the saturation locus, not a fundamental edge. Self-check:
      a Schwarzschild hole (S=A/4=4 pi M^2, E=M, R=2M) has q_Bek = 1 EXACTLY.

  # (B) SdS geometric compactness quotient -- the geometric phase-window (cross-ref only).
  sds_compactness:
    definition: "Q_geom(m) = sum r_i^2 / (sum |r_i|)^2  over the three roots of t^3 - 3t + 6m"
    mass_line: "m = M sqrt(Lambda) in [0, 1/3]  (pure de Sitter -> Nariai merge)"
    endpoint_de_sitter: "1/2 = |Z2|/|mu4|"         # m = 0
    endpoint_nariai: "3/8 = p2(a)/e1(a)^2"         # m = 1/3, roots (1,1,-2)
    monotone: decreasing                           # 1/2 -> 3/8, minimum at the Nariai merge
    cross_ref: >
