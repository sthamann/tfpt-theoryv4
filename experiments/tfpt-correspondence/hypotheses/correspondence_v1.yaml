  - id: CORR.H3_geometric_window
    desc: >
      Order parameter (B) must run monotonically over [3/8, 1/2] with the two endpoints equal
      to the atom expressions, and 3/8 must sit strictly inside the horizonless light-trapping
      window 1/3 < 3/8 < 4/9 < 1/2 (photon sphere / Buchdahl / horizon).
    pass: Q_geom(0)=1/2, Q_geom(1/3)=3/8, monotone decreasing, ladder ordering holds
    kill: the window endpoints are not the atoms, or the ordering breaks.

  - id: CORR.H4_gate_and_no_new_state
    desc: >
      Preregistered typing guard (not a data test): assert the target records its [O]
      dependency on SEAM.EQUIV.01 and refuses any new scale. There must be NO Hagedorn/string
      parameter anywhere in the kernel, and no dimensionful input beyond the single
      irreducible unit v_geo (No-Unit theorem v153).
