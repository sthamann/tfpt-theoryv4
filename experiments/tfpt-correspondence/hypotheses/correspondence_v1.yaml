        Nariai/ECO threshold        3/8  == p2(a)/e1(a)^2         (a=(1,1,2): p2=6, e1=4)
        recovery reflectivity bound (2/3)^6 == (|Z2|/N_fam)^(2*N_fam)
      and the Bekenstein-bound coefficient 4*c3 == 1/(2*pi).
    pass: all five identities hold as exact Fractions (or, for 4*c3, as the exact 1/(2*pi))
    kill: >
